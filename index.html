<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HB Skills Academy ULTRA - User Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--green:#198754;--orange:#ff8c00;--dark:#0f2a44;}
body{margin:0;font-family:Arial,sans-serif;background:#f4f4f4;}
header{background:var(--dark);color:#fff;padding:15px;text-align:center;}
header div:first-child{font-size:24px;font-weight:bold;}
header div:last-child{font-size:14px;color:#fff;opacity:0.85;}
nav{display:none;gap:5px;background:var(--orange);padding:8px;flex-wrap:wrap;}
nav button{flex:1;border:none;padding:10px;color:#fff;border-radius:6px;font-size:15px;cursor:pointer;margin:2px;}
nav button.active{background:var(--green);}
section{display:none;padding:15px;}
input,textarea,select,button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;}
button{background:var(--green);color:#fff;font-weight:bold;cursor:pointer;}
.card{background:#fff;border-radius:10px;padding:10px;margin:10px 0;box-shadow:0 2px 5px rgba(0,0,0,.1);}
.badge{display:inline-block;background:var(--orange);color:#000;padding:3px 6px;border-radius:4px;font-size:12px;margin-left:4px;}
.locked{opacity:0.6;pointer-events:none;}
img{width:100%;height:auto;max-height:300px;object-fit:contain;border-radius:8px;background:#eee;margin-top:10px;}
</style>
</head>
<body>

<header>
  <div>HB Skills Academy ULTRA</div>
  <div>User Portal</div>
</header>

<!-- Auth -->
<section id="authBox">
  <h3>Register / Login</h3>
  <input id="fullName" placeholder="Full Name">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="phone" placeholder="Phone Number (260...)">
  <input id="country" placeholder="Country">
  <input id="occupation" placeholder="Occupation">
  <select id="gender">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
    <option value="Other">Other</option>
  </select>
  <button id="registerBtn">Register</button>
  <button id="loginBtn">Login</button>
</section>

<!-- Navigation -->
<nav id="nav">
  <button data-tab="courses" class="active">Courses</button>
  <button data-tab="enrollments">My Enrollments</button>
  <button data-tab="profile">Profile</button>
  <button id="logout">Logout</button>
</nav>

<!-- Courses -->
<section id="courses">
  <h3>Available Courses</h3>
  <div id="coursesList"></div>
</section>

<!-- Enrollments -->
<section id="enrollments">
  <h3>Enroll in a Course</h3>
  <select id="courseSelect">
    <option value="">Select Course</option>
  </select>
  <input id="paymentMethod" placeholder="Payment Method (Mobile Money / Zanaco)">
  <input type="file" id="paymentProof" accept="image/*">
  <button id="enrollBtn">Submit Enrollment</button>
  <h4>Your Enrollments</h4>
  <div id="myEnrollments"></div>
</section>

<!-- Profile -->
<section id="profile">
  <h3>Profile</h3>
  <input id="nameInput" placeholder="Full Name">
  <input id="phoneInput" placeholder="Phone">
  <input id="countryInput" placeholder="Country">
  <input id="occupationInput" placeholder="Occupation">
  <select id="genderInput">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
    <option value="Other">Other</option>
  </select>
  <button id="saveProfile">Save Profile</button>
</section>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
// Firebase Init
firebase.initializeApp({
  apiKey:"AIzaSyDhRFgn7nXoZlRf-GX7XakwUYrEMFZDgrI",
  authDomain:"pa-mwera.firebaseapp.com",
  projectId:"pa-mwera",
  storageBucket:"pa-mwera.appspot.com"
});
const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

/* Elements */
const authBox=document.getElementById("authBox");
const nav=document.getElementById("nav");
const fullName=document.getElementById("fullName");
const email=document.getElementById("email");
const password=document.getElementById("password");
const phone=document.getElementById("phone");
const country=document.getElementById("country");
const occupation=document.getElementById("occupation");
const gender=document.getElementById("gender");
const coursesList=document.getElementById("coursesList");
const courseSelect=document.getElementById("courseSelect");
const paymentMethod=document.getElementById("paymentMethod");
const paymentProof=document.getElementById("paymentProof");
const myEnrollments=document.getElementById("myEnrollments");
const nameInput=document.getElementById("nameInput");
const phoneInput=document.getElementById("phoneInput");
const countryInput=document.getElementById("countryInput");
const occupationInput=document.getElementById("occupationInput");
const genderInput=document.getElementById("genderInput");

/* NAVIGATION */
function show(id){
  document.querySelectorAll("section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  const btn=document.querySelector(`nav button[data-tab="${id}"]`);
  if(btn) btn.classList.add("active");
}
document.querySelectorAll("nav button[data-tab]").forEach(b=>b.onclick=()=>show(b.dataset.tab));

/* REGISTER & LOGIN */
document.getElementById("registerBtn").onclick=async()=>{
  if(!fullName.value||!email.value||!password.value||!phone.value||!country.value||!occupation.value||!gender.value){
    return alert("Fill all fields");
  }
  const c = await auth.createUserWithEmailAndPassword(email.value,password.value);
  await db.collection("users").doc(c.user.uid).set({
    fullName:fullName.value,
    phone:phone.value,
    country:country.value,
    occupation:occupation.value,
    gender:gender.value,
    role:"student",
    createdAt:Date.now()
  });
  alert("Registered! Login now.");
};
document.getElementById("loginBtn").onclick=()=>auth.signInWithEmailAndPassword(email.value,password.value).catch(e=>alert(e.message));

document.getElementById("logout").onclick=()=>auth.signOut();

/* AUTH STATE */
auth.onAuthStateChanged(async user=>{
  if(user){
    authBox.style.display="none";
    nav.style.display="flex";
    show("courses");
    loadCourses();
    loadEnrollments();
    loadProfile();
  }else{
    authBox.style.display="block";
    nav.style.display="none";
    show("authBox");
  }
});

/* LOAD COURSES */
async function loadCourses(){
  const snap=await db.collection("courses").get();
  coursesList.innerHTML="";
  courseSelect.innerHTML='<option value="">Select Course</option>';
  snap.forEach(doc=>{
    const d=doc.data();
    coursesList.innerHTML+=`<div class="card"><h4>${d.title}</h4><p>${d.description}</p><div>Price: K${d.price||0}</div></div>`;
    courseSelect.innerHTML+=`<option value="${doc.id}">${d.title}</option>`;
  });
}

/* ENROLLMENT WITH PAYMENT PROOF */
document.getElementById("enrollBtn").onclick=async()=>{
  try{
    const user=auth.currentUser;
    if(!user) return alert("Login first");
    if(!courseSelect.value||!paymentMethod.value||paymentProof.files.length===0)
      return alert("Fill all fields and upload proof");

    const file=paymentProof.files[0];
    const ref=storage.ref(`paymentProofs/${user.uid}_${Date.now()}_${file.name}`);
    const snap=await ref.put(file);
    const url=await snap.ref.getDownloadURL();

    await db.collection("enrollments").add({
      userId:user.uid,
      courseId:courseSelect.value,
      paymentMethod:paymentMethod.value,
      paymentProof:url,
      approved:false,
      createdAt:Date.now()
    });
    alert("Enrollment submitted! Wait for admin approval.");
    paymentMethod.value=""; paymentProof.value="";
    loadEnrollments();
  }catch(e){console.error(e); alert("Error submitting enrollment.");}
};

/* LOAD USER ENROLLMENTS */
async function loadEnrollments(){
  const user=auth.currentUser;
  const snap=await db.collection("enrollments").where("userId","==",user.uid).get();
  myEnrollments.innerHTML="";
  snap.forEach(doc=>{
    const d=doc.data();
    const locked=d.approved?"":"locked";
    myEnrollments.innerHTML+=`<div class="card ${locked}">
      <h4>Course ID: ${d.courseId}</h4>
      <p>Payment: ${d.paymentMethod}</p>
      <p>Status: ${d.approved?'<span class="badge approved">Approved</span>':'<span class="badge pending">Pending Approval</span>'}</p>
      <a href="${d.paymentProof}" target="_blank">View Proof</a>
    </div>`;
  });
}

/* PROFILE */
async function loadProfile(){
  const doc=await db.collection("users").doc(auth.currentUser.uid).get();
  const d=doc.data();
  nameInput.value=d.fullName||"";
  phoneInput.value=d.phone||"";
  countryInput.value=d.country||"";
  occupationInput.value=d.occupation||"";
  genderInput.value=d.gender||"";
}
document.getElementById("saveProfile").onclick=async()=>{
  const user=auth.currentUser;
  await db.collection("users").doc(user.uid).update({
    fullName:nameInput.value,
    phone:phoneInput.value,
    country:countryInput.value,
    occupation:occupationInput.value,
    gender:genderInput.value
  });
  alert("Profile saved!");
};
</script>
</body>
</html>
