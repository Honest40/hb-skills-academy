/* NAV */

/* GRID SYSTEM */
.grid{

  grid-template-columns:1fr;
  gap:15px;
}

/* DESKTOP GRID */
@media(min-width:768px){
  .grid{

  }
}
@media(min-width:1024px){
  .grid{

  }
}

/* MEDIA */

/* Cloudinary Upload */
async function uploadToCloudinary(file){
  const fd=new FormData();
  fd.append("file",file);
  fd.append("upload_preset","zedmarket");
  const r = await fetch("https://api.cloudinary.com/v1_1/dc5moeafv/image/upload",{method:"POST",body:fd});
  const d = await r.json();
  if(!d.secure_url) throw "Upload failed";
  return d.secure_url;
}

async function loadQuiz(courseId){

  const snap = await db.collection("courses")
    .doc(courseId)
    .collection("quizzes")
    .get();

  if(snap.empty){
    alert("No quiz available");
    return;
  }

  let questions = [];
  snap.forEach(doc=>questions.push({...doc.data(), id:doc.id}));

  let current = 0;
  let score = 0;
  let timeLeft = 60; // ⏱ seconds per question
  let timer;

  const modal = document.createElement("div");
  modal.style = `
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
  `;

  const box = document.createElement("div");
  box.style = `
    background:#fff;
    padding:20px;
    border-radius:14px;
    width:90%;
    max-width:500px;
    text-align:center;
    animation:fadeIn 0.4s ease;
  `;

  modal.appendChild(box);
  document.body.appendChild(modal);

  /* 🔊 SOUND EFFECTS */
  const correctSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3");
  const wrongSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3");

  function startTimer(){
    clearInterval(timer);
    timeLeft = 60;

    timer = setInterval(()=>{
      timeLeft--;
      document.getElementById("timer").innerText = `⏱ ${timeLeft}s`;

      if(timeLeft <= 0){
        clearInterval(timer);
        current++;
        renderQuestion();
      }
    },1000);
  }

  function renderQuestion(){

    if(current >= questions.length){
      showResult();
      return;
    }

    const q = questions[current];

    box.innerHTML = `
      <h3>🧠 Exam Mode</h3>

      <div style="display:flex;justify-content:space-between;">
        <span>Q ${current+1}/${questions.length}</span>
        <span id="timer">⏱ 60s</span>
      </div>

      <!-- Progress -->
      <div style="background:#eee;height:8px;border-radius:10px;margin:10px 0;">
        <div style="
          width:${((current)/questions.length)*100}%;
          height:100%;
          background:#22c55e;
          border-radius:10px;
          transition:0.4s;
        "></div>
      </div>

      <h4 style="margin:15px 0;">${q.question}</h4>

      <div id="answers"></div>
    `;

    const answersDiv = box.querySelector("#answers");

    ["A","B","C","D"].forEach(letter=>{
      const btn = document.createElement("button");

      btn.innerText = `${letter}. ${q[letter]}`;
      btn.style.marginTop = "8px";

      btn.onclick = () => {

        answersDiv.querySelectorAll("button").forEach(b=>b.disabled=true);

        if(letter === q.answer){
          btn.style.background = "green";
          correctSound.play();
          score++;

          // ✅ ONLY MOVE IF CORRECT
          setTimeout(()=>{
            current++;
            renderQuestion();
          },800);

        }else{
          btn.style.background = "red";
          wrongSound.play();

          // ❌ STAY ON SAME QUESTION
          answersDiv.querySelectorAll("button").forEach(b=>{
            if(b.innerText.startsWith(q.answer)){
              b.style.background = "green";
            }
          });

          // allow retry after short delay
          setTimeout(()=>{
            renderQuestion();
          },1200);
        }
      };

      answersDiv.appendChild(btn);
    });

    startTimer();
  }

  async function showResult(){
    clearInterval(timer);

    const passMark = Math.ceil(questions.length * 0.5);
    const passed = score >= passMark;

    // 📊 SAVE TO FIREBASE
    await db.collection("results").add({
      userId: auth.currentUser.uid,
      courseId,
      score,
      total: questions.length,
      passed,
      createdAt: Date.now()
    });

    box.innerHTML = `
      <h2>🎉 Exam Completed</h2>

      <p style="font-size:18px;">Score: ${score}/${questions.length}</p>

      <p style="color:${passed ? 'green':'red'};font-weight:bold;">
        ${passed ? '✅ PASSED' : '❌ FAILED'}
      </p>

      ${
        passed
        ? `<button onclick="openCertificate('${courseId}')">📜 Get Certificate</button>`
        : `<p>Try again to pass</p>`
      }

      <button onclick="this.closest('div').parentElement.remove()">Close</button>
    `;
  }

  renderQuestion();
}
async function openCourse(courseId){
  const courseDoc = await db.collection("courses").doc(courseId).get();

  if(!courseDoc.exists){
    alert("Course not found");
    return;
  }

  const course = courseDoc.data();

  // Create modal
  const modal = document.createElement("div");
  modal.style = `
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
  `;

  const container = document.createElement("div");
  container.style = `
    background:#fff;
    padding:20px;
    border-radius:12px;
    width:90%;
    max-width:600px;
    max-height:90vh;
    overflow:auto;
  `;

  modal.appendChild(container);
  document.body.appendChild(modal);

  // Get lessons from subcollection
  const snap = await db.collection("courses")
    .doc(courseId)
    .collection("lessons")
    .orderBy("createdAt")
    .get();

  if(snap.empty){
    container.innerHTML = "<p>No lessons yet.</p>";
    return;
  }

  window.lessons = [];
  snap.forEach(doc=>{
    window.lessons.push(doc.data());
  });

  window.currentIndex = 0;

  function renderLesson(){
    const lesson = window.lessons[window.currentIndex];

    container.innerHTML = `
      <h2>${course.title}</h2>
      <p>${course.description}</p>

      <p><b>Lesson ${window.currentIndex+1} of ${window.lessons.length}</b></p>

      <h4>${lesson.title}</h4>
      <p>Lesson ${window.currentIndex+1} of ${window.lessons.length}</p>

      ${
        lesson.type === "video"
        ? `<video controls src="${lesson.url}" 
onended="markComplete('course_'+ '${courseId}', ${window.currentIndex})"" style="width:100%"></video>`
        : lesson.type === "image"
        ? `<img src="${lesson.url}" onclick="markComplete('course_'+ '${courseId}', ${window.currentIndex})">`
        : `<iframe src="${lesson.url}" style="width:100%;height:300px;"></iframe>`
      }

      <div style="display:flex;justify-content:space-between;margin-top:15px;">
        <button onclick="prevLesson()" ${window.currentIndex===0?'disabled':''}>⬅ Back</button>
        <button onclick="nextLesson()" ${window.currentIndex===window.lessons.length-1?'disabled':''}>Next ➡</button>
      </div>

      <button onclick="this.closest('div').parentElement.remove()" style="background:red;margin-top:10px;">Close</button>
    `;
  }

  window.nextLesson = function(){
    if(window.currentIndex < window.lessons.length - 1){
      window.currentIndex++;
      renderLesson();
    } else {
      alert("🎓 Course Completed!");
    }
  }

  window.prevLesson = function(){
    if(window.currentIndex > 0){
      window.currentIndex--;
      renderLesson();
    }
  }

  renderLesson();
}

window.openCourse = openCourse;
window.loadQuiz = loadQuiz;
window.markComplete = markComplete;
window.openCertificate = openCertificate;

function isCourseCompleted(enrollId, totalLessons){
  for(let i = 0; i < totalLessons; i++){
    const key = `progress_${enrollId}_${i}`;
    if(!localStorage.getItem(key)) return false;
  }
  return true;
}

function openCertificate(courseId, enrollId, totalLessons, courseName){

  const completed = isCourseCompleted(enrollId, totalLessons);

  if(!completed){
    return alert("You must complete all lessons first!");
  }

  const u = auth.currentUser;
  if(!u) return alert("Login required");

  const modal = document.createElement("div");
  modal.style = `
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
  `;

  modal.innerHTML = `
    <div style="background:#fff;padding:20px;border-radius:12px;width:90%;max-width:400px;">
      <h3>📜 Certificate Details</h3>

      <input id="certName" placeholder="Enter Full Name" value="${u.email}">
      <button id="generateCert">Download Certificate</button>
      <button onclick="this.parentElement.parentElement.remove()" style="background:red;">Close</button>
    </div>
  `;

  document.body.appendChild(modal);

  document.getElementById("generateCert").onclick = async () => {
    const name = document.getElementById("certName").value;

    const courseDoc = await db.collection("courses").doc(courseId).get();
    const courseNameReal = courseDoc.data().title;

    generatePDF(name, courseNameReal, "CERT-" + Date.now());
    modal.remove();
  };
}

function generatePDF(name, courseName, certId){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setDrawColor(0, 0, 0);
  doc.rect(10, 10, 190, 277);

  doc.setFont("helvetica", "bold");
  doc.setFontSize(22);
  doc.text("CERTIFICATE OF COMPLETION", 105, 40, null, null, "center");

  doc.setFontSize(14);
  doc.text("This certifies that", 105, 65, null, null, "center");

  doc.setFontSize(20);
  doc.text(name, 105, 85, null, null, "center");

  doc.setFontSize(14);
  doc.text("has successfully completed", 105, 105, null, null, "center");

  doc.setFontSize(16);
  doc.text(courseName, 105, 125, null, null, "center");

  doc.setFontSize(12);
  doc.text("Certificate ID: " + certId, 105, 155, null, null, "center");

  doc.text("Date: " + new Date().toLocaleDateString(), 105, 170, null, null, "center");

  doc.setFontSize(10);
  doc.text("HB Skills Academy - Verified Certificate", 105, 250, null, null, "center");

  doc.save(`${courseName}-certificate.pdf`);
}

async function rateCourse(courseId, rating){
  const user = auth.currentUser;
  if(!user) return alert("Login first");

  // find user's enrollment
  const snap = await db.collection("enrollments")
    .where("userId","==",user.uid)
    .where("courseId","==",courseId)
    .get();

  if(snap.empty){
    return alert("Enroll first before rating");
  }

  const docId = snap.docs[0].id;

  await db.collection("enrollments").doc(docId).update({
    rating: rating
  });

  alert("⭐ Rating submitted!");
  loadCourses(); // refresh UI
}
